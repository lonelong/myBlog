<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <!-- Subtle shine overlay -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#shine)"/>
  <!-- ZW text -->
  <text x="256" y="310" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="240" fill="white" letter-spacing="-10">ZW</text>
  <!-- Small code bracket decoration -->
  <text x="256" y="430" text-anchor="middle" font-family="'JetBrains Mono','Courier New',monospace" font-weight="400" font-size="72" fill="rgba(255,255,255,0.5)">&lt;/&gt;</text>
</svg>
